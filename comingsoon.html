    <script>

            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5E3C',
                        secondary: '#C89F72',
                        accent: '#E8D3B9',
                        darkBg: '#2B2118',
                        lightBg: '#FFFDFB',
                        textDark: '#4B3A2E'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->

<body class="bg-lightBg dark:bg-darkBg text-textDark dark:text-lightBg transition-colors duration-300 relative min-h-screen flex flex-col">

    <!-- NAVBAR (Simplified) -->
    <!-- NAVBAR -->
    <!-- NAVBAR (Simplified) -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 bg-lightBg/90 dark:bg-darkBg/90 backdrop-blur-md py-4 border-b border-accent/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-2 group">
                    <i class="fa-solid fa-chair text-primary text-2xl group-hover:text-secondary transition"></i>
                    <span class="font-bold text-xl tracking-tight text-primary dark:text-accent">RestoreCraft</span>
                </a>

                <!-- Right Actions (Toggles Only) -->
                <div class="flex items-center space-x-4">
                    <button class="theme-toggle p-2 rounded-full hover:bg-accent/20 transition text-textDark dark:text-lightBg">
                        <i class="fa-solid fa-moon dark:hidden"></i>

    <!-- COMING SOON CONTENT -->
    <main class="flex-grow flex items-center justify-center pt-24 pb-12 fade-up relative overflow-hidden">
        <!-- Background Decor -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-3xl -z-10"></div>
        
        <div class="text-center px-4 max-w-3xl mx-auto z-10">
            <span class="text-secondary font-bold uppercase tracking-widest text-sm mb-4 block">Something Amazing Is Brewing</span>
            <h1 class="text-5xl md:text-7xl font-bold mb-6">We're <span class="text-primary">Launching</span> Soon</h1>
            <p class="text-lg opacity-80 mb-12 max-w-2xl mx-auto leading-relaxed">Our master craftsmen are putting the final touches on our new platform. Subscribe to be the first to know when we go live and receive exclusive early-bird restoration offers.</p>
            
            <!-- Countdown Placeholder (Visual Only) -->
            <div class="flex justify-center gap-4 md:gap-8 mb-12">
                <div class="bg-white dark:bg-[#33271E] rounded-2xl p-4 md:p-6 shadow-sm border border-accent/20 w-24 md:w-32">

                    <div class="text-xs uppercase tracking-wider opacity-60">Days</div>
                </div>
                <div class="bg-white dark:bg-[#33271E] rounded-2xl p-4 md:p-6 shadow-sm border border-accent/20 w-24 md:w-32">
                    <div class="text-4xl md:text-5xl font-bold text-primary mb-1">08</div>
                    <div class="text-xs uppercase tracking-wider opacity-60">Hours</div>
                </div>
                <div class="bg-white dark:bg-[#33271E] rounded-2xl p-4 md:p-6 shadow-sm border border-accent/20 w-24 md:w-32">
                    <div class="text-4xl md:text-5xl font-bold text-primary mb-1">45</div>
                    <div class="text-xs uppercase tracking-wider opacity-60">Mins</div>
                </div>
            </div>

            <!-- Notify Me Form -->
            <form class="flex flex-col sm:flex-row gap-4 justify-center max-w-lg mx-auto">
                <input type="email" placeholder="Enter your email address" class="flex-grow bg-white dark:bg-[#33271E] border border-accent/40 dark:border-white/20 rounded-full px-6 py-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" required>
                <button type="submit" class="bg-primary hover:bg-secondary text-white px-8 py-4 rounded-full btn-ripple transition shadow-lg font-medium whitespace-nowrap">

    <!-- Custom JS -->
